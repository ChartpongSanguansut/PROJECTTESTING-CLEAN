hen(response =&gt; {\n  // ตรวจสอบ HTTP Status\n  expect(response.status).to.eq(200);\n  // ตรวจสอบ JSON Schema\n  expect(response.body).to.be.an(&#x27;array&#x27;); // หรือ response.body.bookings ถ้า API หุ้มด้วย object\n  if (response.body.length &gt; 0) {\n    const firstBooking = response.body[0];\n    // เช็กว่ามี key ครบถ้วนตาม Requirement\n    expect(firstBooking).to.have.any.keys(&#x27;booking_id&#x27;, &#x27;user_name&#x27;, &#x27;court_id&#x27;, &#x27;time_slot&#x27;, &#x27;status&#x27;);\n  }\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;1b599d10-cb76-4731-9b56-5e9429247df7&quot;,&quot;parentUUID&quot;:&quot;11efc1e6-6ea7-4e8b-8215-4b510d6ff518&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Auto-TC05-02: Verify Admin Cancel Booking Flow (Positive End-to-End)&quot;,&quot;fullTitle&quot;:&quot;Admin API - Transaction Oversight &amp; Rules (TC05) Auto-TC05-02: Verify Admin Cancel Booking Flow (Positive End-to-End)&quot;,&quot;timedOut&quot;:null,&quot;duration&quot;:30,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;context&quot;:null,&quot;code&quot;:&quot;// สมมติว่าสร้าง Mock Booking ไว้แล้วและได้ ID = 999\nconst targetBookingId = &#x27;999&#x27;;\nconst targetCourtId = &#x27;1&#x27;;\n// Step 2: แอดมินกดยกเลิก\ncy.request({\n  method: &#x27;DELETE&#x27;,\n  url: `${baseUrl}/user/cancelbooking/${targetBookingId}`,\n  headers: {\n    Authorization: adminToken\n  }\n}).then(response =&gt; {\n  expect(response.status).to.eq(200);\n});\n// Step 3: เช็กสถานะสนามว่ากลับมาว่างหรือไม่\ncy.request({\n  method: &#x27;GET&#x27;,\n  url: `${baseUrl}/user/timeslots/${targetCourtId}`,\n  headers: {\n    Authorization: adminToken\n  }\n}).then(response =&gt; {\n  expect(response.status).to.eq(200);\n  // หา slot เวลาของ booking ที่เพิ่งยกเลิกไป แล้วเช็กว่า is_available เป็น true\n  // (สมมติว่าเป็น slot แรก)\n  expect(response.body[0].is_available).to.be.true;\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;55c8f436-a087-474c-8b26-a384b4fad9ed&quot;,&quot;parentUUID&quot;:&quot;11efc1e6-6ea7-4e8b-8215-4b510d6ff518&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Auto-TC05-03: Verify Security Role on Cancel Endpoint (Negative Authorization)&quot;,&quot;fullTitle&quot;:&quot;Admin API - Transaction Oversight &amp; Rules (TC05) Auto-TC05-03: Verify Security Role on Cancel Endpoint (Negative Authorization)&quot;,&quot;timedOut&quot;:null,&quot;duration&quot;:17,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;context&quot;:null,&quot;code&quot;:&quot;const targetBookingId = &#x27;888&#x27;;\ncy.request({\n  method: &#x27;DELETE&#x27;,\n  url: `${baseUrl}/user/cancelbooking/${targetBookingId}`,\n  headers: {\n    Authorization: userToken\n  },\n  failOnStatusCode: false // สำคัญมาก! บอก Cypress ว่าถ้า Error 4xx ไม่ต้องให้ Test พัง แต่ให้ไปเช็กค่าต่อ\n}).then(response =&gt; {\n  // ต้องโดนเตะกลับด้วย 403 Forbidden\n  expect(response.status).to.eq(403);\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;e32badf9-be3b-4d1f-8f60-e810f3610b2b&quot;,&quot;parentUUID&quot;:&quot;11efc1e6-6ea7-4e8b-8215-4b510d6ff518&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Auto-TC05-04: Verify XSS Sanitization on Edit Rules (Negative Payload)&quot;,&quot;fullTitle&quot;:&quot;Admin API - Transaction Oversight &amp; Rules (TC05) Auto-TC05-04: Verify XSS Sanitization on Edit Rules (Negative Payload)&quot;,&quot;timedOut&quot;:null,&quot;duration&quot;:27,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;context&quot;:null,&quot;code&quot;:&quot;const maliciousPayload = {\n  rules: \&quot;&lt;script&gt;alert(document.cookie)&lt;/script&gt;&lt;b&gt;Test&lt;/b&gt;\&quot;\n};\n// Step 1: แอดมินเผลอหรือตั้งใจเซฟ payload อันตราย\n// (สมมติว่า API เส้นนี้คือ /admin/rules ตามบริบท)\ncy.request({\n  method: &#x27;PUT&#x27;,\n  // หรือ POST\n  url: `${baseUrl}/admin/rules`,\n  headers: {\n    Authorization: adminToken\n  },\n  body: maliciousPayload\n}).then(response =&gt; {\n  expect(response.status).to.eq(200);\n});\n// Step 2: เรียกข้อมูลกลับมาดูว่าระบบ Escape HTML ไว้ไหม\ncy.request({\n  method: &#x27;GET&#x27;,\n  url: `${baseUrl}/admin/rules`,\n  headers: {\n    Authorization: adminToken\n  }\n}).then(response =&gt; {\n  expect(response.status).to.eq(200);\n  // ตรวจสอบว่าแท็ก &lt;script&gt; ถูกแปลงเป็น &amp;lt;script&amp;gt; ป้องกัน XSS\n  expect(response.body.rules).to.not.include(&#x27;&lt;script&gt;&#x27;);\n  expect(response.body.rules).to.include(&#x27;&amp;lt;script&amp;gt;&#x27;);\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;db7c80b4-b14b-4931-b09e-0bf2c0ae0a7f&quot;,&quot;parentUUID&quot;:&quot;11efc1e6-6ea7-4e8b-8215-4b510d6ff518&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Auto-TC05-05: Verify Empty Booking Date Handling (Positive Edge Case)&quot;,&quot;fullTitle&quot;:&quot;Admin API - Transaction Oversight &amp; Rules (TC05) Auto-TC05-05: Verify Empty Booking Date Handling (Positive Edge Case)&quot;,&quot;timedOut&quot;:null,&quot;duration&quot;:19,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;context&quot;:null,&quot;code&quot;:&quot;const futureDate = &#x27;2028-12-31&#x27;;\ncy.request({\n  method: &#x27;GET&#x27;,\n  url: `${baseUrl}/admin/allbookings?date=${futureDate}`,\n  headers: {\n    Authorization: adminToken\n  }\n}).then(response =&gt; {\n  // ไม่ควรเกิด Server Error 500\n  expect(response.status).to.eq(200);\n  // ควรคืนค่ามาเป็น Array ว่าง\n  expect(response.body).to.be.an(&#x27;array&#x27;).that.is.empty;\n});&quot;,&quot;err&quot;:{}
